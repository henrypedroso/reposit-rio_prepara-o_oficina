<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruzada Pong: Duelo de Reflexos</title>
    <style>
        :root {
            --gold: #d4af37;
            --blood: #8b0000;
            --stone: #1a1510;
        }

        body {
            margin: 0;
            background: #000;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-header {
            text-align: center;
            margin-bottom: 10px;
        }

        canvas {
            border: 3px solid var(--gold);
            background: radial-gradient(circle, #2d241c 0%, #000 100%);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            cursor: none; /* Esconde o mouse sobre o jogo */
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border: 2px solid var(--gold);
            text-align: center;
            display: none;
        }

        button {
            padding: 10px 25px;
            background: var(--stone);
            color: var(--gold);
            border: 1px solid var(--gold);
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            margin-top: 15px;
        }

        button:hover {
            background: var(--gold);
            color: #000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-header">
    <h1 style="margin: 0;">CRUZADA PONG</h1>
    <div id="score" style="font-size: 1.5rem;">Templário 0 - 0 Sarraceno</div>
</div>

<canvas id="pongCanvas"></canvas>

<div class="instructions">
    Mova o mouse/dedo para controlar o Templário<br>
    O Sarraceno (IA) defenderá o lado direito
</div>

<div id="overlay">
    <h2 id="winner-text">FIM DE BATALHA</h2>
    <button onclick="resetGame()">Lutar Novamente</button>
</div>

<script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    const apiKey = "";

    // Configurações
    const paddleWidth = 80; // Largura do card do personagem
    const paddleHeight = 120;
    const ballSize = 15;
    
    let playerY = 0;
    let enemyY = 0;
    let ballX, ballY, ballDX, ballDY;
    let playerScore = 0;
    let enemyScore = 0;
    let gameRunning = true;

    // Imagens
    let playerImg = new Image();
    let enemyImg = new Image();
    let imagesLoaded = false;

    // Redimensionar canvas
    function resize() {
        canvas.width = Math.min(window.innerWidth * 0.9, 800);
        canvas.height = Math.min(window.innerHeight * 0.6, 500);
        playerY = canvas.height / 2 - paddleHeight / 2;
        enemyY = canvas.height / 2 - paddleHeight / 2;
        resetBall();
    }

    async function generateGameAssets() {
        const prompts = [
            { id: 'player', prompt: "Knights Templar warrior portrait, white surcoat with red cross, medieval, realistic, dark background, 256x256" },
            { id: 'enemy', prompt: "Saracen warrior portrait, golden armor, turban, fierce gaze, desert night background, 256x256" }
        ];

        for (const item of prompts) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: "POST",
                    body: JSON.stringify({ instances: [{ prompt: item.prompt }], parameters: { sampleCount: 1 } })
                });
                const result = await response.json();
                const b64 = result.predictions[0].bytesBase64Encoded;
                if (item.id === 'player') playerImg.src = "data:image/png;base64," + b64;
                else enemyImg.src = "data:image/png;base64," + b64;
            } catch (e) {
                console.error("Erro na imagem:", e);
            }
        }
        imagesLoaded = true;
    }

    function resetBall() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        ballDX = (Math.random() > 0.5 ? 4 : -4) * (canvas.width / 800);
        ballDY = (Math.random() * 4 - 2) * (canvas.height / 500);
    }

    function update() {
        if (!gameRunning) return;

        // Movimento da bola
        ballX += ballDX;
        ballY += ballDY;

        // Colisão teto/chão
        if (ballY <= 0 || ballY >= canvas.height) ballDY *= -1;

        // IA do Sarraceno (seguindo a bola com atraso suave)
        let enemyTarget = ballY - paddleHeight / 2;
        enemyY += (enemyTarget - enemyY) * 0.07;
        enemyY = Math.max(0, Math.min(canvas.height - paddleHeight, enemyY));

        // Colisão Templário (Esquerda)
        if (ballX <= 30 + paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) {
            if (ballDX < 0) {
                ballDX *= -1.1; // Aumenta velocidade
                ballDY += (ballY - (playerY + paddleHeight / 2)) * 0.1;
            }
        }

        // Colisão Sarraceno (Direita)
        if (ballX >= canvas.width - 30 - paddleWidth && ballY > enemyY && ballY < enemyY + paddleHeight) {
            if (ballDX > 0) {
                ballDX *= -1.1;
                ballDY += (ballY - (enemyY + paddleHeight / 2)) * 0.1;
            }
        }

        // Pontuação
        if (ballX < 0) {
            enemyScore++;
            checkScore();
            resetBall();
        } else if (ballX > canvas.width) {
            playerScore++;
            checkScore();
            resetBall();
        }

        document.getElementById('score').innerText = `Templário ${playerScore} - ${enemyScore} Sarraceno`;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Linha central
        ctx.strokeStyle = "rgba(212, 175, 55, 0.2)";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Desenhar Templário
        drawFighter(30, playerY, playerImg, "Templário");

        // Desenhar Sarraceno
        drawFighter(canvas.width - 30 - paddleWidth, enemyY, enemyImg, "Sarraceno");

        // Desenhar Bola (Esfera Sagrada)
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--gold');
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function drawFighter(x, y, img, name) {
        // Moldura do card
        ctx.strokeStyle = varColor('--gold');
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, paddleWidth, paddleHeight);
        
        if (img.complete && imagesLoaded) {
            ctx.drawImage(img, x, y, paddleWidth, paddleHeight);
        } else {
            ctx.fillStyle = "#333";
            ctx.fillRect(x, y, paddleWidth, paddleHeight);
            ctx.fillStyle = varColor('--gold');
            ctx.font = "10px Cinzel";
            ctx.fillText("Carregando...", x + 5, y + paddleHeight / 2);
        }
        
        // Brilho de "raquete"
        ctx.fillStyle = "rgba(212, 175, 55, 0.1)";
        ctx.fillRect(x, y, paddleWidth, paddleHeight);
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function checkScore() {
        if (playerScore >= 5 || enemyScore >= 5) {
            gameRunning = false;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('winner-text').innerText = playerScore >= 5 ? "O TEMPLÁRIO VENCEU!" : "O SARRACENO VENCEU!";
        }
    }

    function resetGame() {
        playerScore = 0;
        enemyScore = 0;
        gameRunning = true;
        document.getElementById('overlay').style.display = 'none';
        resetBall();
    }

    // Controles
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        playerY = e.clientY - rect.top - paddleHeight / 2;
        // Limites
        if (playerY < 0) playerY = 0;
        if (playerY > canvas.height - paddleHeight) playerY = canvas.height - paddleHeight;
    });

    // Touch para celular
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        playerY = e.touches[0].clientY - rect.top - paddleHeight / 2;
        if (playerY < 0) playerY = 0;
        if (playerY > canvas.height - paddleHeight) playerY = canvas.height - paddleHeight;
    }, { passive: false });

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        resize();
        generateGameAssets();
        gameLoop();
    };

    window.onresize = resize;
</script>

</body>
</html>
